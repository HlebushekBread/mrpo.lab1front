<div class="wrapper-container">
  @if (productForm) {
    <div class="product-card">
      <!-- Image Section без изменений, только убрали лишние переменные -->
      <div class="image-section">
        <img
          [src]="previewUrl() || imageUrl().url"
          class="product-image"
          (error)="$event.target.src = 'placeholder.png'"
        />
        <input
          type="file"
          #fileInput
          style="display: none"
          accept="image/*"
          (change)="onFileSelected($event)"
        />
        <button type="button" class="btn-upload" (click)="fileInput.click()">
          Загрузить изображение
        </button>
        @if (errorMessage()) {
          <div class="error-container">{{ errorMessage() }}</div>
        }
      </div>

      <form class="form-section" [formGroup]="productForm" (ngSubmit)="submitForm()">
        <div class="form-grid">
          <input type="hidden" formControlName="article" />

          <label class="form-field">
            <span class="label-text">Название</span>
            <input type="text" formControlName="name" />
          </label>

          <label class="form-field">
            <span class="label-text">Категория</span>
            <select formControlName="categoryId">
              @for (cat of categories(); track cat.id) {
                <option [value]="cat.id">{{ cat.name }}</option>
              }
            </select>
          </label>

          <label class="form-field full-width">
            <span class="label-text">Описание</span>
            <textarea formControlName="description" rows="4"></textarea>
          </label>

          <label class="form-field">
            <span class="label-text">Производитель</span>
            <select formControlName="manufacturerId">
              @for (m of manufacturers(); track m.id) {
                <option [value]="m.id">{{ m.name }}</option>
              }
            </select>
          </label>

          <label class="form-field">
            <span class="label-text">Поставщик</span>
            <select formControlName="providerId">
              @for (p of providers(); track p.id) {
                <option [value]="p.id">{{ p.name }}</option>
              }
            </select>
          </label>

          <label class="form-field">
            <span class="label-text">Цена (₽)</span>
            <input type="number" formControlName="price" />
          </label>

          <label class="form-field">
            <span class="label-text">Скидка (%)</span>
            <input type="number" formControlName="discount" />
          </label>

          <label class="form-field">
            <span class="label-text">Остаток</span>
            <input type="number" formControlName="amount" />
          </label>

          <label class="form-field">
            <span class="label-text">Ед. измерения</span>
            <select formControlName="unitId">
              @for (u of units(); track u.id) {
                <option [value]="u.id">{{ u.name }}</option>
              }
            </select>
          </label>
        </div>

        <div class="actions">
          <button type="button" class="btn-primary" (click)="revertChanges()">Отменить</button>
          <button type="submit" class="btn-primary">Подтвердить</button>
          @if (article() !== 'new') {
            <button type="button" class="btn-danger" (click)="deleteProduct()">Удалить</button>
          }
        </div>
      </form>
    </div>
  } @else {
    <div class="error-container">Товара с таким артикулем не существует</div>
  }
</div>
