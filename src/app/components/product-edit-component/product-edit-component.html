<div class="wrapper-container">
    @if(product(); as product) {
        <div class="product-card">
            <div class="image-section">
                @if(previewUrl()){
                    <img [src]="previewUrl()" class="product-image">
                }@else {
                    <img [src]="imageUrl().url" (error)="$event.target.src = 'placeholder.png'" class="product-image">
                }
                <input type="file" #fileInput style="display: none" accept="image/*" (change)="onFileSelected($event)">
                <button type="button" class="btn-upload" (click)="fileInput.click()">
                    Загрузить изображение
                </button>
            </div>

            <form class="form-section">
                <div class="form-grid">
                    <label class="form-field full-width">
                        <span class="label-text">Артикул</span>
                        <input type="text" #articleInput readonly [value]="product.article" class="input-readonly">
                    </label>

                    <label class="form-field">
                        <span class="label-text">Название</span>
                        <input type="text" #nameInput [value]="product.name">
                    </label>
                    
                    <label class="form-field">
                        <span class="label-text">Категория</span>
                        <select #categoryInput>
                            @for (category of categories(); track category.id) {
                                <option [selected]="category.id === product.category.id" [value]="category.id">{{ category.name }}</option>
                            }
                        </select>
                    </label>

                    <label class="form-field full-width">
                        <span class="label-text">Описание</span>
                        <textarea #descriptionInput rows="4">{{ product.description }}</textarea>
                    </label>

                    <label class="form-field">
                        <span class="label-text">Производитель</span>
                        <select #manufacturerInput>
                            @for (manufacturer of manufacturers(); track manufacturer.id) {
                                <option [selected]="manufacturer.id === product.manufacturer.id" [value]="manufacturer.id">{{ manufacturer.name }}</option>
                            }
                        </select>
                    </label>

                    <label class="form-field">
                        <span class="label-text">Поставщик</span>
                        <select #providerInput>
                            @for (provider of providers(); track provider.id) {
                                <option [selected]="provider.id === product.provider.id" [value]="provider.id">{{ provider.name }}</option>
                            }
                        </select>
                    </label>

                    <label class="form-field">
                        <span class="label-text">Цена (₽)</span>
                        <input type="number" #priceInput [value]="product.price">
                    </label>

                    <label class="form-field">
                        <span class="label-text">Скидка (%)</span>
                        <input type="number" #discountInput [value]="product.discount">
                    </label>

                    <label class="form-field">
                        <span class="label-text">Остаток</span>
                        <input type="number" #amountInput [value]="product.amount">
                    </label>

                    <label class="form-field">
                        <span class="label-text">Ед. измерения</span>
                        <select #unitInput>
                            @for (unit of units(); track unit.id) {
                                <option [selected]="unit.id === product.unit.id" [value]="unit.id">{{ unit.name }}</option>
                            }
                        </select>
                    </label>
                </div>

                <div class="actions">
                    <button type="button" class="btn-primary" (click)="reloadPage()">Отменить</button>
                    <button type="button" class="btn-primary" (click)="submitForm({
                        article: articleInput.value,
                        name: nameInput.value,
                        categoryId: categoryInput.value,
                        description: descriptionInput.value,
                        manufacturerId: manufacturerInput.value,
                        providerId: providerInput.value,
                        price: priceInput.value,
                        discount: discountInput.value,
                        amount: amountInput.value,
                        unitId: unitInput.value
                    })">Подтвердить</button>
                    <button type="button" class="btn-danger">Удалить</button>
                </div>
            </form>
        </div>
    }
</div>
